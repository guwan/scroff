<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head(${device != null and device.id != null} ? '编辑设备' : '新建设备')}"></head>
<body>

<nav th:replace="~{_layout :: navbar('devices')}"></nav>

<main class="container narrow">
    <h1 th:text="${device != null and device.id != null} ? '编辑设备' : '新建设备'">设备</h1>

    <form method="post"
          th:action="${device != null and device.id != null} ? @{'/devices/' + ${device.id}} : @{/devices}"
          th:object="${form}" class="form">
        <div class="field">
            <label>名称 *</label>
            <input type="text" th:field="*{name}" maxlength="100" required>
            <div class="err" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="field-row">
            <div class="field">
                <label>ADB IP / 主机名 *</label>
                <input type="text" th:field="*{host}" placeholder="192.168.1.100" required>
                <div class="err" th:if="${#fields.hasErrors('host')}" th:errors="*{host}"></div>
            </div>
            <div class="field">
                <label>ADB 端口 *</label>
                <input type="number" th:field="*{adbPort}" min="1" max="65535" required>
                <div class="err" th:if="${#fields.hasErrors('adbPort')}" th:errors="*{adbPort}"></div>
            </div>
        </div>
        <div class="field">
            <label>位置</label>
            <input type="text" th:field="*{location}" placeholder="大厅 1 号窗口">
        </div>
        <div class="field">
            <label>备注</label>
            <textarea th:field="*{notes}" rows="3"></textarea>
        </div>
        <div class="field">
            <label class="checkbox">
                <input type="checkbox" th:field="*{enabled}"> 启用
            </label>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary" type="submit">保存</button>
            <a class="btn" href="/devices">取消</a>
        </div>
    </form>
</main>

<footer th:replace="~{_layout :: footer}"></footer>
</body>
</html>
