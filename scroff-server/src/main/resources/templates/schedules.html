<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('定时任务')}"></head>
<body>

<nav th:replace="~{_layout :: navbar('schedules')}"></nav>

<main class="container">
    <div th:replace="~{_layout :: flash}"></div>

    <div class="page-header">
        <h1>定时任务</h1>
        <a class="btn btn-primary" href="/schedules/new">+ 新建定时</a>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>名称</th>
            <th>设备</th>
            <th>动作</th>
            <th>Cron</th>
            <th>启用</th>
            <th>上次执行</th>
            <th>结果</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${page.content}">
            <td th:text="${s.id}">1</td>
            <td th:text="${s.name}">--</td>
            <td>
                <span th:if="${deviceMap != null and deviceMap.containsKey(s.deviceId)}"
                      th:text="${deviceMap[s.deviceId]}">--</span>
            </td>
            <td>
                <span th:classappend="${s.action.name()=='ON'} ? 'tag tag-on' : 'tag tag-off'"
                      th:text="${s.action}">OFF</span>
            </td>
            <td><code th:text="${s.cron}">--</code></td>
            <td>
                <span th:classappend="${s.enabled} ? 'tag tag-ok' : 'tag tag-off'"
                      th:text="${s.enabled} ? '是' : '否'">是</span>
            </td>
            <td th:text="${s.lastRunAt != null} ? ${#temporals.format(s.lastRunAt,'MM-dd HH:mm:ss')} : '-'">-</td>
            <td>
                <span th:if="${s.lastRunStatus != null and s.lastRunStatus.name()=='SUCCESS'}" class="tag tag-ok">成功</span>
                <span th:if="${s.lastRunStatus != null and s.lastRunStatus.name()=='FAILED'}"  class="tag tag-err">失败</span>
            </td>
            <td class="actions">
                <a class="btn btn-sm" th:href="@{'/schedules/' + ${s.id} + '/edit'}">编辑</a>
                <form method="post" th:action="@{'/schedules/' + ${s.id} + '/toggle'}" style="display:inline">
                    <button class="btn btn-sm" type="submit"
                            th:text="${s.enabled} ? '禁用' : '启用'">禁用</button>
                </form>
                <form method="post" th:action="@{'/schedules/' + ${s.id} + '/delete'}"
                      style="display:inline"
                      onsubmit="return confirm('确认删除？')">
                    <button class="btn btn-sm btn-err" type="submit">删</button>
                </form>
            </td>
        </tr>
        <tr th:if="${page.content.empty}">
            <td colspan="9" class="empty">还没有定时任务，<a href="/schedules/new">立即新建</a></td>
        </tr>
        </tbody>
    </table>

    <div class="pager" th:if="${page.totalPages > 1}">
        <span>共 <b th:text="${page.totalElements}">0</b> 条</span>
        <a th:if="${page.hasPrevious()}" th:href="@{/schedules(page=${page.number-1})}">«</a>
        <span>第 <b th:text="${page.number+1}">1</b> / <b th:text="${page.totalPages}">1</b> 页</span>
        <a th:if="${page.hasNext()}" th:href="@{/schedules(page=${page.number+1})}">»</a>
    </div>
</main>

<footer th:replace="~{_layout :: footer}"></footer>
</body>
</html>
