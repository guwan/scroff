# =============================================================
# Scroff Server - 公共配置（提交到 Git）
# 敏感配置请用环境变量或 application-local.yml（被 .gitignore 忽略）
# 占位符语法：${VAR_NAME:default_value}，未设置时用默认值
# =============================================================

server:
  port: 8880
  servlet:
    context-path: /

spring:
  application:
    name: scroff-server

  datasource:
    # 数据库连接 —— 密码等敏感信息请通过环境变量注入
    # 或在本目录创建 application-local.yml 覆盖（已被 .gitignore 忽略）
    url: ${DB_URL:jdbc:mariadb://127.0.0.1:3306/scroff?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USER:scroff}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000

  jpa:
    hibernate:
      # 首次启动自动建表（生产可改为 none，用 schema.sql 手工建）
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  thymeleaf:
    cache: false          # 开发期关缓存，改模板立即生效
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html

# 自定义 ADB 配置
# 支持多个 adb 来源（profile），可在 /settings 页面运行时切换激活项
scroff:
  adb:
    # profiles 列表。每项可指向不同来源：
    #   - android-sdk: 本地 Android SDK 自带的 adb.exe
    #   - wsl-ubuntu:  WSL 内的 adb（用 wsl.exe 做包装器）
    #   - linux-default: 部署到 Linux 服务器时的默认路径
    # 新增 profile：复制一段，改 id/name/executable 即可
    profiles:
      - id: linux-default
        name: "Linux 默认 /usr/bin/adb"
        executable: /usr/bin/adb
        enabled: true
      - id: wsl-ubuntu
        name: "WSL Ubuntu adb（通过 wsl.exe 包装）"
        executable: C:/Windows/System32/wsl.exe
        args: ["adb"]
        enabled: false
      - id: android-sdk
        name: "Android SDK (Windows)"
        # Windows 本地开发通常在这里（Android Studio 默认）：
        #   C:/Users/<user>/AppData/Local/Android/Sdk/platform-tools/adb.exe
        # 也支持环境变量覆盖：
        executable: ${ADB_EXECUTABLE_ANDROID_SDK:CHANGE_ME_ANDROID_SDK_ADB_PATH}
        enabled: false
    # 默认激活哪个 profile（运行时可被 web UI 覆盖，写入 system_config 表）
    active-profile-id: linux-default
    # 启动时是否自动连接所有 enabled 设备
    auto-connect-on-startup: ${ADB_AUTO_CONNECT:true}
    # 心跳检测间隔（秒）
    heartbeat-interval: 30
    # 单条 adb 命令超时（毫秒）
    command-timeout: 10000
    # 关屏命令模板（{on} 会被替换为 0 或 1）
    screen-off-command: "cd /sys/kernel/debug/dispdbg && echo disp0 > name && echo blank > command && echo {param} > param && echo 1 > start"
  schedule:
    # 是否启动时立即把 enabled 的 schedule 注册到 TaskScheduler
    load-on-startup: true

logging:
  level:
    root: INFO
    com.scroff.server: INFO
    org.hibernate.SQL: WARN
