# =============================================================
# Scroff Server - 公共配置（提交到 Git）
# 敏感配置请用环境变量或 application-local.yml（被 .gitignore 忽略）
# 占位符语法：${VAR_NAME:default_value}，未设置时用默认值
# =============================================================

server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: scroff-server

  datasource:
    # 数据库连接 —— 密码等敏感信息请通过环境变量注入
    # 或在本目录创建 application-local.yml 覆盖（已被 .gitignore 忽略）
    url: ${DB_URL:jdbc:mariadb://127.0.0.1:3306/scroff?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USER:scroff}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000

  jpa:
    hibernate:
      # 首次启动自动建表（生产可改为 none，用 schema.sql 手工建）
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  thymeleaf:
    cache: false          # 开发期关缓存，改模板立即生效
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html

# 自定义 ADB 配置
scroff:
  adb:
    # adb 可执行文件路径。Linux 默认 /usr/bin/adb；Windows 开发时需指定
    executable: ${ADB_EXECUTABLE:/usr/bin/adb}
    # 启动时是否自动连接所有 enabled 设备
    auto-connect-on-startup: ${ADB_AUTO_CONNECT:true}
    # 心跳检测间隔（秒）
    heartbeat-interval: 30
    # 单条 adb 命令超时（毫秒）
    command-timeout: 10000
    # 关屏命令模板（{on} 会被替换为 0 或 1）
    screen-off-command: "cd /sys/kernel/debug/dispdbg && echo disp0 > name && echo blank > command && echo {param} > param && echo 1 > start"
  schedule:
    # 是否启动时立即把 enabled 的 schedule 注册到 TaskScheduler
    load-on-startup: true

logging:
  level:
    root: INFO
    com.scroff.server: INFO
    org.hibernate.SQL: WARN
